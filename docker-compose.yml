services:
  db:
    image: postgres:16-alpine
    container_name: lms_postgres_db
    restart: always
    environment:
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_password
      POSTGRES_DB: lms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms_user -d lms_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: lms_express_backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      DATABASE_URL: "postgresql://lms_user:lms_password@db:5432/lms_db?schema=public"
      JWT_SECRET: "super_secret_jwt_key_for_lms_system_2026_enterprise"
      JWT_EXPIRES_IN: "7d"
      NODE_ENV: "production"
      FRONTEND_URL: "http://localhost:3000,http://localhost"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: lms_nextjs_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: lms_nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
